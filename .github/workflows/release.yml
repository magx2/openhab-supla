name: Release with Maven & Github

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_USERNAME
          server-password: GITHUB_TOKEN
      - name: Configure Git user
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
      - name: Verify with Maven
        run: mvn -B -ntp spotless:check verify
        env:
          GITHUB_USERNAME: x-access-token
          GITHUB_TOKEN: ${{ secrets.PAT }}
      - name: Release with Maven
        run: mvn -B -ntp release:prepare release:perform -Dgoals=package
        env:
          GITHUB_USERNAME: x-access-token
          GITHUB_TOKEN: ${{ secrets.PAT }}
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.job }}
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
      - name: Locate release artifact
        id: config
        run: |
          artifact=$(find target/checkout/target -maxdepth 1 -type f -name 'supla-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort | tail -n 1)
          if [ -z "$artifact" ]; then
            echo "release artifact was not found!"
            exit 12
          fi
          artifact_name=$(basename "$artifact")
          echo "artifact_path=$artifact"
          echo "artifact_path=$artifact" >> $GITHUB_OUTPUT
          echo "artifact_name=$artifact_name"
          echo "artifact_name=$artifact_name" >> $GITHUB_OUTPUT
          
          tag=$(git describe --tags --abbrev=0)
          if [ -z "$tag" ]; then
            echo "tag was not set!"
            exit 12
          fi
          echo "tag=$tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT
      - name: Release with Github
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.config.outputs.artifact_path }}
          asset_name: ${{ steps.config.outputs.artifact_name }}
          tag: ${{ steps.config.outputs.tag }}
          overwrite: true
          release_name: Version ${{ steps.config.outputs.artifact_name }}
          body: "Release of version ${{ steps.config.outputs.artifact_name }}"
